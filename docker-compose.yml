version: "3.9"
services:
  fleet-config:
    build: .
    ports: ["8012:8000"]
    volumes: ["./data:/app/data"]
    environment:
      DATABASE_URL: sqlite:///data/fleet_config.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
